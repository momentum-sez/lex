<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Background -->
  <rect width="1280" height="640" fill="#f6f2e9"/>

  <!-- Thin hairline frame -->
  <rect x="40" y="40" width="1200" height="560" fill="none" stroke="#1b2a4a" stroke-width="1" opacity="0.25"/>

  <!-- Title: Lex -->
  <text x="80" y="220" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
        font-size="160" font-weight="400" fill="#1b2a4a" letter-spacing="-2">Lex</text>

  <!-- Subtitle -->
  <text x="82" y="288" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
        font-size="36" font-weight="400" font-style="italic" fill="#2c2c2c">
    A Logic for Jurisdictional Rules
  </text>

  <!-- Separator rule under title block -->
  <line x1="82" y1="330" x2="520" y2="330" stroke="#1b2a4a" stroke-width="1.25" opacity="0.6"/>

  <!-- Left caption under rule -->
  <g transform="translate(82,380)">
    <text font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
          font-size="22" font-weight="400" fill="#2c2c2c">
      <tspan x="0" dy="0">A calculus with defeasibility, temporal</tspan>
      <tspan x="0" dy="30">stratification, tribunal modals, and typed</tspan>
      <tspan x="0" dy="30">discretion holes filled by authorities.</tspan>
    </text>
  </g>

  <!-- Right panel: 2x2 property grid -->
  <g transform="translate(680,110)">
    <!-- Grid cells — 2 columns x 2 rows, cell 260x155, gap 10 -->
    <!-- Top-left: Defeasibility -->
    <g transform="translate(0,0)">
      <rect width="260" height="155" fill="#ffffff" stroke="#1b2a4a" stroke-width="1.25"/>
      <text x="18" y="38" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
            font-size="22" font-weight="400" fill="#1b2a4a">Defeasibility</text>
      <line x1="18" y1="52" x2="100" y2="52" stroke="#1b2a4a" stroke-width="1"/>
      <text x="18" y="84" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#2c2c2c">
        r1 : p &#8658; q
      </text>
      <text x="18" y="108" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#2c2c2c">
        r2 : p,s &#8658; &#172;q
      </text>
      <text x="18" y="136" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#8a1e1e">
        r2 &#62; r1  (priority)
      </text>
    </g>

    <!-- Top-right: Temporal stratification -->
    <g transform="translate(275,0)">
      <rect width="260" height="155" fill="#ffffff" stroke="#1b2a4a" stroke-width="1.25"/>
      <text x="18" y="38" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
            font-size="22" font-weight="400" fill="#1b2a4a">Temporal stratification</text>
      <line x1="18" y1="52" x2="100" y2="52" stroke="#1b2a4a" stroke-width="1"/>
      <!-- Time arrow: t0 -> t1 -->
      <g transform="translate(18,100)">
        <circle cx="10" cy="0" r="6" fill="#1b2a4a"/>
        <text x="0" y="30" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#2c2c2c">time_0</text>
        <line x1="24" y1="0" x2="180" y2="0" stroke="#1b2a4a" stroke-width="1.25"/>
        <polygon points="180,-5 190,0 180,5" fill="#1b2a4a"/>
        <circle cx="200" cy="0" r="6" fill="#1b2a4a"/>
        <text x="186" y="30" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#2c2c2c">time_1</text>
      </g>
      <text x="18" y="78" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
            font-size="16" font-style="italic" fill="#2c2c2c">one-way</text>
    </g>

    <!-- Bottom-left: Tribunal modals -->
    <g transform="translate(0,165)">
      <rect width="260" height="155" fill="#ffffff" stroke="#1b2a4a" stroke-width="1.25"/>
      <text x="18" y="38" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
            font-size="22" font-weight="400" fill="#1b2a4a">Tribunal modals</text>
      <line x1="18" y1="52" x2="100" y2="52" stroke="#1b2a4a" stroke-width="1"/>
      <text x="18" y="88" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#2c2c2c">
        &#9723;<tspan fill="#8a1e1e">[adgm]</tspan> &#966;
      </text>
      <text x="18" y="114" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#2c2c2c">
        &#9671;<tspan fill="#8a1e1e">[scz]</tspan>  &#968;
      </text>
      <text x="18" y="140" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
            font-size="14" font-style="italic" fill="#2c2c2c">
        per-jurisdiction necessity &amp; possibility
      </text>
    </g>

    <!-- Bottom-right: Discretion holes -->
    <g transform="translate(275,165)">
      <rect width="260" height="155" fill="#ffffff" stroke="#1b2a4a" stroke-width="1.25"/>
      <text x="18" y="38" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
            font-size="22" font-weight="400" fill="#1b2a4a">Discretion holes</text>
      <line x1="18" y1="52" x2="100" y2="52" stroke="#1b2a4a" stroke-width="1"/>
      <text x="18" y="90" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="15" fill="#2c2c2c">
        ?h : T @ <tspan fill="#8a1e1e">authority</tspan>
      </text>
      <text x="18" y="122" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
            font-size="14" font-style="italic" fill="#2c2c2c">
        typed placeholders filled only
      </text>
      <text x="18" y="142" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
            font-size="14" font-style="italic" fill="#2c2c2c">
        by named regulator/tribunal
      </text>
    </g>
  </g>

  <!-- Bottom-left: repo URL -->
  <text x="80" y="572" font-family="'SF Mono','Menlo','Consolas',monospace"
        font-size="18" fill="#2c2c2c">
    github.com/momentum-sez/lex
  </text>

  <!-- Bottom-right: license + test count + SN status -->
  <text x="1200" y="572" font-family="'Garamond Premier Pro','Adobe Garamond Pro',Garamond,Georgia,serif"
        font-size="18" fill="#2c2c2c" text-anchor="end">
    Apache-2.0  &#183;  756 tests  &#183;  SN Qed for flat+&#955;&#946;+exceptions
  </text>
</svg>
